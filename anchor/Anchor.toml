[toolchain]
anchor_version = "0.30.1"

[features]
resolution = true
skip-lint = false

# ── Program IDs per cluster ───────────────────────────────────────────────────
# After `anchor deploy` on devnet, replace the placeholder below with the
# real program ID printed in the terminal, then run `anchor build` again so
# the IDL and binary stay in sync.

[programs.localnet]
identity_reputation = "IdentRep11111111111111111111111111111111111"

[programs.devnet]
identity_reputation = "IdentRep11111111111111111111111111111111111"

[registry]
url = "https://api.apr.dev"

# ── Active provider ───────────────────────────────────────────────────────────
# Switch `cluster` between "Localnet" and "Devnet" as needed.
# `wallet` must point to a keypair that holds devnet SOL.

[provider]
cluster = "Devnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"
