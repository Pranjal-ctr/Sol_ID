kind = "web"
previewPath = "/"
title = "Solana Identity dApp"
version = "1.0.0"
id = "artifacts/solana-dapp"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21530

[services.development]
run = "pnpm --filter @workspace/solana-dapp run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/solana-dapp", "run", "build" ]
publicDir = "artifacts/solana-dapp/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21530"
BASE_PATH = "/"
